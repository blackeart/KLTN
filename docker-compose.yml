services:
  postgres:
    image: postgres:15
    container_name: nestjs_db
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: nest_db
    ports:
      - '5433:5432' # <--- Đổi số bên trái thành 5433
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
